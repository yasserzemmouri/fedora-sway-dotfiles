# === Notifications ===
# Show notification when a command runs longer than 3 seconds
# Only if the Kitty window doesn't have focus
notify_on_cmd_finish unfocused 3 notify

# === Font ===
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12

# === Transparency (works for normal windows) ===
background_opacity 0.85
dynamic_background_opacity yes

# === For fullscreen: use background image instead ===
# Uncomment these if you use fullscreen often
# background_image ~/.config/sway/wallpaper.png
# background_image_layout cscaled
# background_tint 0.85

# === Theme - Tomorrow Night ===
background #1d1f21
foreground #c5c8c6
cursor #c5c8c6
selection_background #373b41

color0 #1d1f21
color8 #1d1f21
color1 #cc6666
color9 #cc6666
color2 #b5bd68
color10 #b5bd68
color3 #f0c674
color11 #f0c674
color4 #81a2be
color12 #81a2be
color5 #b294bb
color13 #b294bb
color6 #8abeb7
color14 #8abeb7
color7 #c5c8c6
color15 #c5c8c6

# === Wayland/Sway specific ===
remember_window_size yes
initial_window_width 800
initial_window_height 600

# Performance for Wayland
sync_to_monitor yes
repaint_delay 10
