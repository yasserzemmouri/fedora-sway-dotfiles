# === Base settings ===
set -g default-terminal "xterm-kitty"
set-option -ga terminal-overrides ",xterm-kitty*:Tc"
set -g mouse on
set -g history-limit 10000

# === Theme to match Kitty ===
# Tomorrow Night theme for tmux
set -g status-bg colour235   # #1d1f21
set -g status-fg colour250   # #c5c8c6
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=colour250

# === Status bar ===
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=colour81,bold] #S #[fg=colour235,bg=colour250]"
set -g status-right "#[fg=colour250,bg=colour235] #[fg=colour81]#(whoami) #[fg=colour250] #[fg=colour250]#(hostname -s) #[fg=colour250] %Y-%m-%d %H:%M #[fg=colour250,bg=colour235]#[fg=colour235,bg=colour250] #S "

# === Key bindings ===
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind | split-window -h
bind - split-window -v
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# === Vim-like pane navigation ===
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# === Mouse support ===
set -g mouse on
